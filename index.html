<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Stock 📈</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-green: #00ff41;
            --accent-red: #ff4141;
            --text-main: #f1f1f1;
            --text-dim: #888;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container { 
            width: 100%;
            max-width: 800px; /* ปรับความกว้างให้พอดีสายตา ไม่บานเกินไป */
        }

        /* ส่วนหัวพอร์ต - ปรับให้เด่นชัด */
        .header-card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 24px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #222;
        }

        .total-val { font-size: 48px; font-weight: 800; margin: 10px 0; letter-spacing: -1px; }
        .summary-row { display: flex; justify-content: space-between; background: #111; padding: 20px; border-radius: 16px; margin-top: 20px; }

        /* รายการหุ้น - เน้น 1 แถวต่อ 1 หุ้น */
        #stock-list {
            display: flex;
            flex-direction: column;
            gap: 25px; /* เพิ่มระยะห่างระหว่างตัว */
            width: 100%;
        }

        .stock-item { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 24px; 
            border: 1px solid #333;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .symbol-name { font-size: 24px; font-weight: bold; color: var(--accent-green); }
        .price-info { text-align: right; }
        .current-price { font-size: 22px; font-weight: bold; }

        /* ปรับขนาดกราฟให้ใหญ่และเต็มตา */
        .chart-container { 
            height: 400px; /* เพิ่มความสูงกราฟ */
            width: 100%;
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid #222;
            background: #000;
        }

        .profit { color: var(--accent-green); } 
        .loss { color: var(--accent-red); }
        h3 { font-size: 22px; margin-left: 10px; }
        small { color: var(--text-dim); font-size: 14px; }
        
        /* ซ่อน Scrollbar ของ TradingView เล็กน้อยเพื่อความคลีน */
        iframe { border-radius: 16px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-card">
        <h3>สินทรัพย์ของฉัน</h3>
        <small>มูลค่าสินทรัพย์ทั้งหมด (USD)</small>
        <div class="total-val" id="total-usd">$0.00</div>
        <div id="total-thb" style="color: var(--text-dim); font-size: 18px;">฿0.00 THB</div>
        
        <div class="summary-row">
            <div><small>% เปลี่ยนแปลง</small><div id="total-pc" class="profit" style="font-size: 20px; font-weight:bold;">+0.00%</div></div>
            <div><small>กำไร (USD)</small><div id="total-profit" class="profit" style="font-size: 20px; font-weight:bold;">+$0.00</div></div>
        </div>
    </div>

    <h3>รายการสินทรัพย์</h3>
    <div id="stock-list"></div>
</div>

<script>
    const MY_PORTFOLIO = [
        { symbol: "NVDA", name: "NVIDIA", shares: 0.1, cost: 120.50 },
        { symbol: "MSFT", name: "Microsoft", shares: 0.05, cost: 405.00 },
        { symbol: "AAPL", name: "Apple", shares: 0.1, cost: 172.00 },
        { symbol: "AMZN", name: "Amazon", shares: 0.08, cost: 178.50 },
        { symbol: "ALAB", name: "Astera Labs", shares: 0.2, cost: 80.00 }
    ];

    const CURRENT_PRICES = {
        "NVDA": 880.20, "MSFT": 420.10, "AAPL": 175.50, "AMZN": 185.00, "ALAB": 98.00
    };

    const USD_THB_RATE = 32.30;

    function render() {
        const list = document.getElementById('stock-list');
        let totalUSD = 0;
        let totalCost = 0;

        list.innerHTML = ""; 

        MY_PORTFOLIO.forEach(stock => {
            const price = CURRENT_PRICES[stock.symbol] || 0;
            const value = price * stock.shares;
            const costTotal = stock.cost * stock.shares;
            const profit = value - costTotal;
            const pc = ((price - stock.cost) / stock.cost) * 100;

            totalUSD += value;
            totalCost += costTotal;

            list.innerHTML += `
                <div class="stock-item">
                    <div class="stock-header">
                        <div>
                            <div class="symbol-name">${stock.symbol}</div>
                            <small>${stock.shares} หุ้น | ต้นทุน $${stock.cost}</small>
                        </div>
                        <div class="price-info">
                            <div class="current-price">$${value.toFixed(2)}</div>
                            <div class="${profit >= 0 ? 'profit' : 'loss'}" style="font-weight:bold;">
                                ${pc >= 0 ? '↗' : '↘'} ${Math.abs(pc).toFixed(2)}% ($${profit.toFixed(2)})
                            </div>
                        </div>
                    </div>
                    <div class="chart-container">
                        <div id="w-${stock.symbol}" style="height:100%;"></div>
                    </div>
                </div>
            `;
        });

        // สรุปยอดรวม
        const totalProfit = totalUSD - totalCost;
        const totalPC = (totalProfit / totalCost) * 100;
        document.getElementById('total-usd').innerText = `$${totalUSD.toFixed(2)}`;
        document.getElementById('total-thb').innerText = `฿${(totalUSD * USD_THB_RATE).toLocaleString()} THB`;
        document.getElementById('total-profit').innerText = `$${totalProfit.toFixed(2)}`;
        document.getElementById('total-pc').innerText = `${totalPC >= 0 ? '+' : ''}${totalPC.toFixed(2)}%`;
        
        document.getElementById('total-profit').className = totalProfit >= 0 ? 'profit' : 'loss';
        document.getElementById('total-pc').className = totalProfit >= 0 ? 'profit' : 'loss';

        // โหลดกราฟแบบปรับแต่งให้โหลดไวขึ้น
        MY_PORTFOLIO.forEach(stock => {
            new TradingView.widget({
                "autosize": true,
                "symbol": "NASDAQ:" + stock.symbol,
                "interval": "D",
                "timezone": "Asia/Bangkok",
                "theme": "dark",
                "style": "1",
                "locale": "th",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": true,
                "hide_legend": true,
                "save_image": false,
                "container_id": `w-${stock.symbol}`
            });
        });
    }

    render();
</script>

</body>
</html>
