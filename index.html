<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Stock 📈 - Live Dashboard</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-green: #00ff41;
            --accent-red: #ff4141;
            --text-main: #f1f1f1;
            --text-dim: #888;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container { width: 100%; max-width: 900px; }

        .header-card { 
            background: var(--card-bg); 
            padding: 35px; 
            border-radius: 28px; 
            margin-bottom: 30px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border: 1px solid #222;
            text-align: center;
        }

        .total-val { font-size: clamp(40px, 8vw, 60px); font-weight: 800; margin: 10px 0; letter-spacing: -2px; }
        
        .summary-row { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            background: #111; 
            padding: 20px; 
            border-radius: 20px; 
            margin-top: 25px; 
            gap: 10px;
        }

        #stock-list { display: flex; flex-direction: column; gap: 30px; width: 100%; }

        .stock-item { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 28px; 
            border: 1px solid #333;
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .symbol-name { font-size: 28px; font-weight: bold; color: var(--accent-green); }
        .price-info { text-align: right; }
        .current-price { font-size: 24px; font-weight: bold; }

        .chart-container { 
            height: 450px; 
            width: 100%;
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid #222;
            background: #000;
            margin-top: 20px;
        }

        .profit { color: var(--accent-green); } 
        .loss { color: var(--accent-red); }
        h3 { font-size: 24px; margin-bottom: 20px; align-self: flex-start; }
        small { color: var(--text-dim); font-size: 13px; font-weight: 500; text-transform: uppercase; }
        .status-tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: #333; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-card">
        <h3>สินทรัพย์ของฉัน <span id="update-status" class="status-tag">กำลังโหลด...</span></h3>
        <small>มูลค่าปัจจุบันรวม (USD)</small>
        <div class="total-val" id="total-usd">$0.00</div>
        <div id="total-thb" style="color: var(--text-dim); font-size: 20px; margin-top: 5px;">฿0.00 THB</div>
        
        <div class="summary-row">
            <div>
                <small>ต้นทุนรวม</small>
                <div id="total-cost-display" style="font-size: 20px; font-weight:bold; margin-top:5px;">$0.00</div>
            </div>
            <div>
                <small>กำไร/ขาดทุน</small>
                <div id="total-profit" class="profit" style="font-size: 20px; font-weight:bold; margin-top:5px;">+$0.00</div>
            </div>
            <div>
                <small>% กำไร</small>
                <div id="total-pc" class="profit" style="font-size: 20px; font-weight:bold; margin-top:5px;">+0.00%</div>
            </div>
        </div>
    </div>

    <h3 style="margin-left: 10px;">รายการสินทรัพย์ (รายตัว)</h3>
    <div id="stock-list"></div>
</div>

<script>
    // --- แก้ไขตรงนี้ครับ ---
    // cost: คือจำนวนเงินดอลลาร์ที่คุณจ่ายซื้อไปจริงๆ (เช่น 15.11)
    // shares: คือจำนวนหุ้นที่คุณได้รับมา (เช่น 0.0742317)
    const MY_PORTFOLIO = [
        { symbol: "NVDA", shares: 0.0742317, cost: 15.11 },
        { symbol: "MSFT", shares: 0.0072341, cost: 3.07 },
        { symbol: "AAPL", shares: 0.0113922, cost: 3.08 },
        { symbol: "AMZN", shares: 0.0061046, cost: 1.54 },
        { symbol: "ALAB", shares: 0.0077574, cost: 1.54 }
    ];

    const API_KEY = 'd7npjg1r01qm3637bb2gd7npjg1r01qm3637bb30';
    let current_usd_thb = 32.29;

    async function getLivePrice(symbol) {
        try {
            const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`);
            const data = await response.json();
            return data.c;
        } catch (e) {
            return null;
        }
    }

    async function updatePortfolio() {
        const list = document.getElementById('stock-list');
        const status = document.getElementById('update-status');
        
        const rate = await getLivePrice("OANDA:USD_THB");
        if (rate) current_usd_thb = rate;
        
        let totalUSDValue = 0;
        let totalCostAmount = 0; // ยอดรวมเงินต้น
        let htmlContent = "";

        for (const stock of MY_PORTFOLIO) {
            const currentPrice = await getLivePrice(stock.symbol);
            if (!currentPrice) continue;

            const currentValue = currentPrice * stock.shares; // มูลค่าตลาดตอนนี้
            const costAmount = stock.cost; // เงินต้นที่คุณจ่ายไป (ค่าจากตัวแปร cost ตรงๆ)
            const profit = currentValue - costAmount;
            const pc = ((currentValue - costAmount) / costAmount) * 100;

            totalUSDValue += currentValue;
            totalCostAmount += costAmount; // บวกเงินต้นเข้าไปตรงๆ ตามที่คุณต้องการ

            htmlContent += `
                <div class="stock-item">
                    <div class="stock-header">
                        <div>
                            <div class="symbol-name">${stock.symbol}</div>
                            <small>${stock.shares} หุ้น | เงินต้น $${stock.cost}</small>
                        </div>
                        <div class="price-info">
                            <div class="current-price">$${currentValue.toFixed(2)}</div>
                            <div class="${profit >= 0 ? 'profit' : 'loss'}" style="font-weight:bold;">
                                ${pc >= 0 ? '↗' : '↘'} ${Math.abs(pc).toFixed(2)}% ($${profit.toFixed(2)})
                            </div>
                        </div>
                    </div>
                    <div class="chart-container" id="container-${stock.symbol}"></div>
                </div>
            `;
        }

        list.innerHTML = htmlContent;

        const totalProfit = totalUSDValue - totalCostAmount;
        const totalPC = (totalProfit / totalCostAmount) * 100;

        document.getElementById('total-usd').innerText = `$${totalUSDValue.toFixed(2)}`;
        document.getElementById('total-thb').innerText = `฿${(totalUSDValue * current_usd_thb).toLocaleString(undefined, {minimumFractionDigits: 2})} THB (Rate: ${current_usd_thb.toFixed(2)})`;
        
        // แสดงต้นทุนรวมแบบเอา "เงินต้นแต่ละตัว" มาบวกกัน
        document.getElementById('total-cost-display').innerText = `$${totalCostAmount.toFixed(2)}`;
        
        document.getElementById('total-profit').innerText = `${totalProfit >= 0 ? '+' : ''}$${totalProfit.toFixed(2)}`;
        document.getElementById('total-pc').innerText = `${totalPC >= 0 ? '+' : ''}${totalPC.toFixed(2)}%`;
        
        document.getElementById('total-profit').className = totalProfit >= 0 ? 'profit' : 'loss';
        document.getElementById('total-pc').className = totalProfit >= 0 ? 'profit' : 'loss';

        MY_PORTFOLIO.forEach(stock => {
            new TradingView.widget({
                "autosize": true,
                "symbol": "NASDAQ:" + stock.symbol,
                "interval": "D",
                "theme": "dark",
                "style": "1",
                "locale": "th",
                "hide_top_toolbar": true,
                "hide_legend": true,
                "container_id": `container-${stock.symbol}`
            });
        });

        status.innerText = "อัปเดตราคาสดเมื่อ: " + new Date().toLocaleTimeString();
    }

    updatePortfolio();
    setInterval(updatePortfolio, 60000);
</script>

</body>
</html>
