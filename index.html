<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Stock 📈 - Live Dashboard</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-green: #00ff41;
            --accent-red: #ff4141;
            --text-main: #f1f1f1;
            --text-dim: #888;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container { width: 100%; max-width: 900px; }

        .header-card { 
            background: var(--card-bg); 
            padding: 35px; 
            border-radius: 28px; 
            margin-bottom: 20px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border: 1px solid #222;
            text-align: center;
        }

        .total-val { font-size: clamp(40px, 8vw, 60px); font-weight: 800; margin: 10px 0; letter-spacing: -2px; }
        
        .summary-row { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            background: #111; 
            padding: 20px; 
            border-radius: 20px; 
            margin-top: 25px; 
            gap: 10px;
        }

        /* ส่วนควบคุมการเรียงลำดับ */
        .sort-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .sort-btn {
            background: #222;
            color: var(--text-dim);
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .sort-btn.active {
            background: var(--accent-green);
            color: #000;
            font-weight: bold;
            border-color: var(--accent-green);
        }

        #stock-list { display: flex; flex-direction: column; gap: 30px; width: 100%; }

        .stock-item { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 28px; 
            border: 1px solid #333;
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .symbol-info { display: flex; align-items: center; }

        .stock-logo {
            width: 55px; height: 55px;
            border-radius: 50%;
            background-color: #fff;
            margin-right: 18px;
            object-fit: contain;
            padding: 5px;
            border: 2px solid #333;
            box-sizing: border-box;
        }

        .symbol-name { font-size: 28px; font-weight: bold; color: var(--accent-green); line-height: 1.1; }
        .price-info { text-align: right; }
        .current-price { font-size: 24px; font-weight: bold; }

        .chart-container { 
            height: 450px; width: 100%;
            border-radius: 20px; overflow: hidden; 
            border: 1px solid #222; background: #000;
            margin-top: 20px;
        }

        .profit { color: var(--accent-green); } 
        .loss { color: var(--accent-red); }
        h3 { font-size: 24px; margin-bottom: 20px; align-self: flex-start; }
        small { color: var(--text-dim); font-size: 13px; font-weight: 500; text-transform: uppercase; }
        .status-tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: #333; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-card">
        <h3>สินทรัพย์ของฉัน <span id="update-status" class="status-tag">กำลังโหลด...</span></h3>
        <small>มูลค่าปัจจุบันรวม (USD)</small>
        <div class="total-val" id="total-usd">$0.00</div>
        <div id="total-thb" style="color: var(--text-dim); font-size: 20px; margin-top: 5px;">฿0.00 THB</div>
        
        <div class="summary-row">
            <div><small>ต้นทุนรวม</small><div id="total-cost-display" style="font-size: 20px; font-weight:bold; margin-top:5px;">$0.00</div></div>
            <div><small>กำไร/ขาดทุน</small><div id="total-profit" class="profit" style="font-size: 20px; font-weight:bold; margin-top:5px;">+$0.00</div></div>
            <div><small>% กำไร</small><div id="total-pc" class="profit" style="font-size: 20px; font-weight:bold; margin-top:5px;">+0.00%</div></div>
        </div>
    </div>

    <div class="sort-controls">
        <button class="sort-btn active" onclick="changeSort('default')">ค่าเริ่มต้น</button>
        <button class="sort-btn" onclick="changeSort('profit')">เรียงตามกำไร</button>
        <button class="sort-btn" onclick="changeSort('cost')">เรียงตามเงินต้น</button>
    </div>

    <div id="stock-list"></div>
</div>

<script>
    const MY_PORTFOLIO = [
        { symbol: "NVDA", shares: 0.0829689, cost: 16.94, domain: "nvidia.com" },
        { symbol: "MSFT", shares: 0.0072341, cost: 3.07, domain: "microsoft.com" },
        { symbol: "AAPL", shares: 0.0113922, cost: 3.08, domain: "apple.com" },
        { symbol: "AMZN", shares: 0.0061046, cost: 1.54, domain: "amazon.com" },
        { symbol: "ALAB", shares: 0.0077574, cost: 1.54, domain: "asteralabs.com" }
    ];

    const API_KEY = 'd7npjg1r01qm3637bb2gd7npjg1r01qm3637bb30';
    let current_usd_thb = 32.29;
    let currentSort = 'default'; // default, profit, cost

    function changeSort(type) {
        currentSort = type;
        document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        updatePortfolio(); // สั่งเรนเดอร์ใหม่ตามลำดับที่เลือก
    }

    async function getLivePrice(symbol) {
        try {
            const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`);
            const data = await response.json();
            return data.c;
        } catch (e) { return null; }
    }

    async function updatePortfolio() {
        const list = document.getElementById('stock-list');
        const status = document.getElementById('update-status');
        
        const rate = await getLivePrice("OANDA:USD_THB");
        if (rate) current_usd_thb = rate;
        
        let displayData = [];
        let totalUSDValue = 0;
        let totalCostAmount = 0;

        // 1. ดึงข้อมูลและคำนวณทั้งหมดก่อน
        for (const stock of MY_PORTFOLIO) {
            const currentPrice = await getLivePrice(stock.symbol);
            if (!currentPrice) continue;

            const currentValue = currentPrice * stock.shares;
            const costAmount = stock.cost;
            const profitValue = currentValue - costAmount;
            const profitPC = (profitValue / costAmount) * 100;

            totalUSDValue += currentValue;
            totalCostAmount += costAmount;

            displayData.push({
                ...stock,
                currentValue,
                profitValue,
                profitPC
            });
        }

        // 2. เรียงลำดับข้อมูล
        if (currentSort === 'profit') {
            displayData.sort((a, b) => b.profitValue - a.profitValue);
        } else if (currentSort === 'cost') {
            displayData.sort((a, b) => b.cost - a.cost);
        }

        // 3. เรนเดอร์ HTML
        let htmlContent = "";
        displayData.forEach(stock => {
            const logoUrl = `https://www.google.com/s2/favicons?sz=128&domain=${stock.domain}`;
            htmlContent += `
                <div class="stock-item">
                    <div class="stock-header">
                        <div class="symbol-info">
                            <img class="stock-logo" src="${logoUrl}" alt="${stock.symbol}">
                            <div>
                                <div class="symbol-name">${stock.symbol}</div>
                                <small>${stock.shares} หุ้น | เงินต้น $${stock.cost}</small>
                            </div>
                        </div>
                        <div class="price-info">
                            <div class="current-price">$${stock.currentValue.toFixed(2)}</div>
                            <div class="${stock.profitValue >= 0 ? 'profit' : 'loss'}" style="font-weight:bold;">
                                ${stock.profitPC >= 0 ? '↗' : '↘'} ${Math.abs(stock.profitPC).toFixed(2)}% ($${stock.profitValue.toFixed(2)})
                            </div>
                        </div>
                    </div>
                    <div class="chart-container" id="container-${stock.symbol}"></div>
                </div>
            `;
        });

        list.innerHTML = htmlContent;

        // อัปเดตส่วนหัว
        const totalProfit = totalUSDValue - totalCostAmount;
        const totalPC = totalCostAmount > 0 ? (totalProfit / totalCostAmount) * 100 : 0;

        document.getElementById('total-usd').innerText = `$${totalUSDValue.toFixed(2)}`;
        document.getElementById('total-thb').innerText = `฿${(totalUSDValue * current_usd_thb).toLocaleString(undefined, {minimumFractionDigits: 2})} THB`;
        document.getElementById('total-cost-display').innerText = `$${totalCostAmount.toFixed(2)}`;
        document.getElementById('total-profit').innerText = `${totalProfit >= 0 ? '+' : ''}$${totalProfit.toFixed(2)}`;
        document.getElementById('total-pc').innerText = `${totalPC >= 0 ? '+' : ''}${totalPC.toFixed(2)}%`;
        
        document.getElementById('total-profit').className = totalProfit >= 0 ? 'profit' : 'loss';
        document.getElementById('total-pc').className = totalProfit >= 0 ? 'profit' : 'loss';

        // โหลดกราฟ
        displayData.forEach(stock => {
            new TradingView.widget({
                "autosize": true,
                "symbol": "NASDAQ:" + stock.symbol,
                "interval": "D",
                "theme": "dark",
                "style": "1",
                "locale": "th",
                "hide_top_toolbar": true,
                "hide_legend": true,
                "container_id": `container-${stock.symbol}`
            });
        });

        status.innerText = "อัปเดตราคาสดเมื่อ: " + new Date().toLocaleTimeString();
    }

    updatePortfolio();
    setInterval(updatePortfolio, 60000);
</script>

</body>
</html>
