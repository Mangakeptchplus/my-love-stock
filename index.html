<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Stock 📈</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background-color: #0d0d0d; color: #f1f1f1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .app-container { max-width: 450px; margin: auto; }
        .header-card { background: #1a1a1a; padding: 25px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .total-val { font-size: 36px; font-weight: bold; margin: 5px 0; color: #ffffff; }
        .summary-row { display: flex; justify-content: space-between; background: #111; padding: 15px; border-radius: 12px; margin-top: 15px; }
        
        .stock-item { background: #1a1a1a; padding: 18px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .profit { color: #00ff41; } .loss { color: #ff4141; }
        
        /* ปรับส่วนกราฟให้แสดงตลอดเวลา */
        .chart-container { 
            height: 250px; 
            margin-top: 15px; 
            border-radius: 10px; 
            overflow: hidden; 
            border: 1px solid #333; 
            display: block; /* แสดงตลอดเวลา */
        }
        
        h3 { margin-top: 0; margin-bottom: 15px; }
        small { color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-card">
        <h3>สินทรัพย์ของฉัน</h3>
        <small>มูลค่าสินทรัพย์ทั้งหมด (USD)</small>
        <div class="total-val" id="total-usd">$0.00</div>
        <div id="total-thb" style="color: #888; font-size: 16px;">฿0.00 THB</div>
        
        <div class="summary-row">
            <div><small>% เปลี่ยนแปลง</small><div id="total-pc" class="profit" style="font-weight:bold;">+0.00%</div></div>
            <div><small>กำไร (USD)</small><div id="total-profit" class="profit" style="font-weight:bold;">+$0.00</div></div>
        </div>
    </div>

    <h3 style="margin-left: 5px;">รายการสินทรัพย์</h3>
    <div id="stock-list"></div>
</div>

<script>
    // --- หลังบ้าน: ข้อมูลหุ้น ---
    const MY_PORTFOLIO = [
        { symbol: "NVDA", name: "NVIDIA", shares: 0.1, cost: 120.50 },
        { symbol: "MSFT", name: "Microsoft", shares: 0.05, cost: 405.00 },
        { symbol: "AAPL", name: "Apple", shares: 0.1, cost: 172.00 },
        { symbol: "AMZN", name: "Amazon", shares: 0.08, cost: 178.50 },
        { symbol: "ALAB", name: "Astera Labs", shares: 0.2, cost: 80.00 }
    ];

    // --- ราคาปัจจุบัน (อัปเดตเองได้เลย) ---
    const CURRENT_PRICES = {
        "NVDA": 880.20, "MSFT": 420.10, "AAPL": 175.50, "AMZN": 185.00, "ALAB": 98.00
    };

    const USD_THB_RATE = 32.30;

    function render() {
        const list = document.getElementById('stock-list');
        let totalUSD = 0;
        let totalCost = 0;

        list.innerHTML = ""; 

        MY_PORTFOLIO.forEach(stock => {
            const price = CURRENT_PRICES[stock.symbol] || 0;
            const value = price * stock.shares;
            const costTotal = stock.cost * stock.shares;
            const profit = value - costTotal;
            const pc = ((price - stock.cost) / stock.cost) * 100;

            totalUSD += value;
            totalCost += costTotal;

            // สร้าง HTML โดยไม่มีปุ่มกด แต่มี Container กราฟเลย
            list.innerHTML += `
                <div class="stock-item">
                    <div style="display:flex; justify-content:space-between; align-items: center;">
                        <div>
                            <strong style="font-size:18px; color:#00ff41;">${stock.symbol}</strong><br>
                            <small>${stock.shares} หุ้น | ต้นทุน $${stock.cost}</small>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:18px; font-weight:bold;">$${value.toFixed(2)}</div>
                            <div class="${profit >= 0 ? 'profit' : 'loss'}" style="font-size: 14px; font-weight:bold;">
                                ${pc >= 0 ? '↗' : '↘'} ${Math.abs(pc).toFixed(2)}% ($${profit.toFixed(2)})
                            </div>
                        </div>
                    </div>
                    <div id="c-${stock.symbol}" class="chart-container">
                        <div id="w-${stock.symbol}" style="height:100%;"></div>
                    </div>
                </div>
            `;
        });

        // อัปเดตสรุปพอร์ตด้านบน
        const totalProfit = totalUSD - totalCost;
        const totalPC = (totalProfit / totalCost) * 100;
        document.getElementById('total-usd').innerText = `$${totalUSD.toFixed(2)}`;
        document.getElementById('total-thb').innerText = `฿${(totalUSD * USD_THB_RATE).toLocaleString()} THB`;
        document.getElementById('total-profit').innerText = `$${totalProfit.toFixed(2)}`;
        document.getElementById('total-pc').innerText = `${totalPC >= 0 ? '+' : ''}${totalPC.toFixed(2)}%`;
        document.getElementById('total-profit').className = totalProfit >= 0 ? 'profit' : 'loss';
        document.getElementById('total-pc').className = totalProfit >= 0 ? 'profit' : 'loss';

        // โหลดกราฟ TradingView ให้หุ้นทุุกตัวทันที
        MY_PORTFOLIO.forEach(stock => {
            new TradingView.widget({
                "width": "100%", 
                "height": "100%", 
                "symbol": "NASDAQ:" + stock.symbol,
                "interval": "D", 
                "theme": "dark", 
                "style": "1", 
                "locale": "th",
                "container_id": `w-${stock.symbol}`,
                "enable_publishing": false,
                "hide_top_toolbar": true,
                "hide_legend": true, // ซ่อนชื่อหุ้นในกราฟเพื่อความสะอาด
                "save_image": false
            });
        });
    }

    render();
</script>

</body>
</html>
